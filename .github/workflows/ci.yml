name: Run CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Build binaries
        run: |
          mkdir -p /tmp/out
          CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o /tmp/out/agentd-api ./cmd/agentd-api
          CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o /tmp/out/agentd-worker ./cmd/agentd-worker
          CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o /tmp/out/agentd-node ./cmd/agentd-node
          CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o /tmp/out/acp-supervisor ./cmd/acp-supervisor
