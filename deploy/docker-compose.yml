services:
  temporal:
    image: temporalio/temporalite:latest
    command: temporalite start --ip 0.0.0.0 --port 7233
    ports:
      - "7233:7233"

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: agentd
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data:
