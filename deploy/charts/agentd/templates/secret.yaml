{{- if include "agentd.controlPlaneSecretEnabled" . }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "agentd.controlPlaneSecretName" . }}
  labels:
    {{- include "agentd.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.database.url }}
  DATABASE_URL: {{ .Values.database.url | quote }}
  {{- end }}
  {{- if .Values.redis.url }}
  REDIS_URL: {{ .Values.redis.url | quote }}
  {{- end }}
{{- end }}
